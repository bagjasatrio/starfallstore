version: '3.8'

networks:
  starfall-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  backend-vendor:

services:
  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: starfall-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    depends_on:
      - laravel
      - node
    networks:
      - starfall-net

  # ─── Laravel PHP-FPM ──────────────────────────────────────────────────────
  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starfall-laravel
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - starfall-net

  # ─── Laravel Queue Worker ─────────────────────────────────────────────────
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starfall-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --queue=topup,notifications,default
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - starfall-net

  # ─── Laravel Scheduler ────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starfall-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    env_file:
      - ./backend/.env
    depends_on:
      - laravel
    networks:
      - starfall-net

  # ─── Node.js / Vite Dev Server ────────────────────────────────────────────
  node:
    image: node:20-alpine
    container_name: starfall-node
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost/api
      - VITE_PUSHER_APP_KEY=${PUSHER_APP_KEY}
      - VITE_PUSHER_APP_CLUSTER=${PUSHER_APP_CLUSTER}
      - VITE_TURNSTILE_SITE_KEY=${CLOUDFLARE_TURNSTILE_SITE_KEY}
    networks:
      - starfall-net

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: starfall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-starfallstore}
      POSTGRES_USER: ${DB_USERNAME:-starfall}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-starfall_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-starfall} -d ${DB_DATABASE:-starfallstore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - starfall-net

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: starfall-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - starfall-net
