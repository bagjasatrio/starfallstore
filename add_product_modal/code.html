<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Product - StarfallStore</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#0d1321",
                        "secondary-fixed-dim": "#4cd7f6",
                        "on-surface-variant": "#c2c6d6",
                        "on-tertiary-fixed-variant": "#334282",
                        "on-primary-fixed": "#001a42",
                        "inverse-primary": "#005ac2",
                        "on-secondary-fixed-variant": "#004e5c",
                        "surface-container-low": "#151c29",
                        "error-container": "#93000a",
                        "primary-container": "#4d8eff",
                        "tertiary-fixed": "#dde1ff",
                        "surface-container-highest": "#2e3543",
                        "on-tertiary": "#1a2b6a",
                        "error": "#ffb4ab",
                        "outline": "#8c909f",
                        "on-tertiary-fixed": "#001354",
                        "tertiary-fixed-dim": "#b8c4ff",
                        "on-tertiary-container": "#122463",
                        "on-secondary": "#003640",
                        "outline-variant": "#424754",
                        "surface-container": "#19202d",
                        "secondary-container": "#03b5d3",
                        "on-secondary-container": "#00424e",
                        "secondary": "#4cd7f6",
                        "inverse-surface": "#dce2f5",
                        "primary-fixed-dim": "#adc6ff",
                        "on-primary-container": "#00285d",
                        "surface-variant": "#2e3543",
                        "surface": "#0d1321",
                        "tertiary": "#b8c4ff",
                        "surface-container-high": "#232a38",
                        "on-background": "#dce2f5",
                        "inverse-on-surface": "#2a303f",
                        "surface-tint": "#adc6ff",
                        "surface-container-lowest": "#070e1b",
                        "on-surface": "#dce2f5",
                        "on-error": "#690005",
                        "tertiary-container": "#7e8dd2",
                        "on-primary": "#002e6a",
                        "on-primary-fixed-variant": "#004395",
                        "primary-fixed": "#d8e2ff",
                        "surface-bright": "#333948",
                        "primary": "#adc6ff",
                        "surface-dim": "#0d1321",
                        "on-secondary-fixed": "#001f26",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed": "#acedff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "40px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "container-max": "1280px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist"],
                        "body-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Geist"],
                        "headline-lg": ["Geist"],
                        "label-sm": ["Geist"],
                        "label-md": ["Geist"],
                        "headline-xl": ["Geist"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {

                        "label-sm": ["12px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "label-md": ["14px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-xl": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]

                }
            }
        }

<style>
        .glass-panel {
            background: rgba(13, 19, 33, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-effect {
            box-shadow: 0 0 20px rgba(76, 215, 246, 0.15);
        }
        .input-glow:focus {
            box-shadow: 0 0 15px rgba(76, 215, 246, 0.2);
            border-color: rgba(76, 215, 246, 0.5);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen relative font-body-md">
<!-- Background Image / Blurred Catalog Concept -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-background/80 z-10 backdrop-blur-md pointer-events-none"></div>
<img alt="" class="w-full h-full object-cover opacity-30" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2bL-PJoJ5dmRauKJROFJrVg3DjYkB3o2KEWOWiRj72KHUGO2xz4L7pmx0erehjJiBU17AR-QyRs3gQ_UD630YzKL2DawfZZzx0zC5PqCZcin-k-gWfsdlGYNfJ9sPDyGtja_eGrUrz1tfRePIZH3AEj_bttJSZ0-qRofH2F4BK3EfnTTvmXUxMouPHSuwGsuDRtaE4GJVfOvGCPt9RIHpHPCsUfSvxY2gJzY33vOahWeEX9SgnLREnATYQUsXI7p0_y3PTMkmqE8"/>
</div>
<!-- Modal Container -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-gutter">
<!-- Glassmorphic Modal Box -->
<div class="glass-panel w-full max-w-2xl rounded-xl shadow-2xl relative overflow-hidden flex flex-col glow-effect">
<!-- Modal Header -->
<div class="p-gutter border-b border-white/10 flex justify-between items-center bg-surface-container-low/40">
<h2 class="font-headline-md text-headline-md text-secondary">Add New Product</h2>
<button class="text-on-surface-variant hover:text-secondary-fixed-dim transition-colors p-2 rounded-full hover:bg-white/5 active:scale-95">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body (Form) -->
<div class="p-gutter overflow-y-auto max-h-[70vh]">
<form class="space-y-6">
<!-- Row 1: Name & Category -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Product Name -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="product-name">Game / Service Name</label>
<input class="w-full bg-surface-container-highest/50 border border-white/10 rounded-lg px-4 py-3 text-on-surface font-body-md placeholder:text-outline-variant focus:outline-none input-glow transition-all duration-300" id="product-name" placeholder="e.g., Starfall Credits Bundle" type="text"/>
</div>
<!-- Category Dropdown -->
<div class="space-y-2 relative">
<label class="font-label-md text-label-md text-on-surface-variant block" for="product-category">Category</label>
<div class="relative">
<select class="w-full bg-surface-container-highest/50 border border-white/10 rounded-lg px-4 py-3 text-on-surface font-body-md focus:outline-none input-glow transition-all duration-300 appearance-none cursor-pointer" id="product-category">
<option class="text-outline-variant bg-surface-container" disabled="" selected="" value="">Select a category</option>
<option class="bg-surface-container" value="mobile-legends">Mobile Legends</option>
<option class="bg-surface-container" value="free-fire">Free Fire</option>
<option class="bg-surface-container" value="valorant">VALORANT</option>
<option class="bg-surface-container" value="steam">Steam Wallet</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Row 2: Price & Currency -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Price -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="product-price">Price</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-on-surface-variant font-body-md">$</span>
<input class="w-full bg-surface-container-highest/50 border border-white/10 rounded-lg pl-8 pr-4 py-3 text-on-surface font-body-md placeholder:text-outline-variant focus:outline-none input-glow transition-all duration-300" id="product-price" placeholder="0.00" type="number"/>
</div>
</div>
</div>
<!-- Row 3: Image Upload Area -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block">Product Image</label>
<div class="w-full border-2 border-dashed border-white/10 rounded-xl p-8 flex flex-col items-center justify-center text-center hover:border-secondary/50 transition-colors duration-300 bg-surface-container-highest/20 cursor-pointer group relative overflow-hidden">
<!-- Placeholder Icon -->
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300 shadow-[0_0_15px_rgba(76,215,246,0.1)]">
<span class="material-symbols-outlined text-3xl text-secondary-fixed-dim" data-icon="cloud_upload">cloud_upload</span>
</div>
<p class="font-body-md text-body-md text-on-surface mb-1">Drag and drop your image here</p>
<p class="font-body-sm text-body-sm text-outline">or <span class="text-secondary cursor-pointer hover:underline">browse files</span></p>
<p class="font-label-sm text-label-sm text-outline-variant mt-4">Supports: JPG, PNG, WEBP (Max 5MB)</p>
<input accept="image/png, image/jpeg, image/webp" class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
</div>
</form>
</div>
<!-- Modal Footer (Actions) -->
<div class="p-gutter border-t border-white/10 bg-surface-container-lowest/80 flex justify-end gap-4 mt-auto">
<button class="px-6 py-2.5 rounded-lg font-label-md text-label-md text-on-surface-variant hover:text-white hover:bg-white/5 transition-all duration-200" type="button">
                    Cancel
                </button>
<button class="px-6 py-2.5 rounded-lg font-label-md text-label-md bg-secondary text-on-secondary hover:bg-secondary-fixed-dim hover:shadow-[0_0_15px_rgba(76,215,246,0.4)] transition-all duration-300 active:scale-95 flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
                    Add Product
                </button>
</div>
</div>
</div>
</body></html>
