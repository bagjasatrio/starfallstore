worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;
    
    # -------------------------------------
    # SECURITY HEADERS
    # -------------------------------------
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # -------------------------------------
    # GZIP COMPRESSION (Optimized for Mobile/Cellular)
    # -------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    server {
        listen 80;
        server_name _; # Configure with your production domain, e.g., starfallstore.com

        # -------------------------------------
        # 1. SERVE FRONTEND (React Vite Build)
        # -------------------------------------
        location / {
            root /var/www/html;
            index index.html index.htm;
            # Fallback to index.html for Single Page Application routing
            try_files $uri $uri/ /index.html;
        }

        # -------------------------------------
        # 2. SERVE BACKEND API (Laravel)
        # -------------------------------------
        location /api {
            alias /var/www/backend/public;
            try_files $uri $uri/ @laravel;
        }

        location @laravel {
            rewrite /api/(.*)$ /api/index.php?/$1 last;
        }

        # PHP-FPM Configuration for Laravel
        location ~ ^/api/index\.php(/|$) {
            root /var/www/backend/public;
            fastcgi_pass app:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        }

        # Deny access to hidden files (e.g. .env, .git)
        location ~ /\. {
            deny all;
        }
    }
}
