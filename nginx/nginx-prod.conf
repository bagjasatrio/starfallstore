server {
    listen 80;
    listen [::]:80;
    server_name starfallstore.my.id www.starfallstore.my.id;

    # Production Nginx Configuration for StarfallStore
    # Document Root for Static Frontend (React/Vite build)
    root /usr/share/nginx/html/dist;
    index index.html;

    # ─── Security Headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip Compression (Performance) ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # ─── Static Frontend Assets ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Backend API Proxy (Laravel PHP-FPM) ────────────────────────────────
    location ~ ^/(api|sanctum) {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Increase timeouts for long-running API requests if needed
        fastcgi_read_timeout 60s;
        fastcgi_connect_timeout 60s;
    }

    # ─── Deny Access to Hidden Files ────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
